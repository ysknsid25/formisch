name: Setup environment
description: Setup environment with pnpm, Node.js, and package builds

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false
        standalone: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'
        cache: pnpm

    - name: Setup npm
      shell: bash
      run: npm install --global npm@11.11.1

    - name: Install dependencies
      shell: bash
      run: pnpm install

    - name: Build core package
      shell: bash
      run: pnpm build
      working-directory: packages/core

    - name: Build methods package
      shell: bash
      run: pnpm build
      working-directory: packages/methods
